services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgresAdmin#13
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  npm:
    build:
      context: .
      dockerfile: DockerFile.npm
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run build

  web:
    build:
      context: .
      dockerfile: DockerFile
    volumes:
      - .:/app
    ports:
      - 5023:5023
    env_file: .env
    environment:
      DATABASE_URI: postgresql://postgres:postgresAdmin#13@db:5432/postgres
    depends_on:
      db:
        condition: service_healthy
      npm:
        condition: service_completed_successfully

volumes:
  postgres_data:
